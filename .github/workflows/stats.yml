name: Generate stats images
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download github-stats CLI
        run: |
          sudo curl -sSL \
            --output /usr/local/bin/github-stats \
            'https://github.com/jstrieb/github-stats/releases/latest/download/github-stats_x86_64-linux'
          sudo chmod +x /usr/local/bin/github-stats

      - name: Generate overview + languages SVGs
        run: |
          mkdir -p imgs
          cd imgs
          github-stats --access-token "${{ secrets.GITHUB_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=AnonymousV73X&theme=dark&hide_border=true&background=0D1117
          path: imgs/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add imgs/
          git commit -m "Update stats images" || exit 0
          git push
