name: Generate stats images
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone jstrieb/github-stats generator
        run: git clone --depth 1 https://github.com/jstrieb/github-stats.git /tmp/github-stats

      - name: Install dependencies
        working-directory: /tmp/github-stats
        run: pip install -r requirements/requirements.txt

      - name: Generate overview + languages SVGs
        working-directory: /tmp/github-stats
        run: python3 generate_images.py
        env:
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDE_FORKED_REPOS: "true"

      - name: Move generated images into imgs/
        run: |
          mkdir -p imgs
          cp /tmp/github-stats/generated/overview.svg imgs/overview.svg
          cp /tmp/github-stats/generated/languages.svg imgs/languages.svg

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=AnonymousV73X&theme=dark&hide_border=true&background=0D1117
          path: imgs/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add imgs/
          git commit -m "Update stats images" || exit 0
          git push
